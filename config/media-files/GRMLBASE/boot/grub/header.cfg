set default=0
set timeout=20

function load_video {
   insmod efi_gop
   insmod efi_uga
   insmod vbe
   # insmod vga  # disabled "vga", its way too slow for graphics mode.
   insmod video_bochs
   insmod video_cirrus
}

# Try graphics on both EFI and BIOS, but with simpler settings for BIOS
# For HiDPI displays: try larger font first, which allows higher resolutions
set font_loaded=0
if [ -f /boot/grub/unicode-24.pf2 ] ; then
  if loadfont /boot/grub/unicode-24.pf2 ; then
    set font_loaded=1
    # Larger 24pt font: can use higher resolutions while staying readable
    set gfxmode=1920x1080,1680x1050,1600x1200,1440x900,1280x1024,1024x768,auto
  fi
fi

# Fallback to standard font if larger font not available
if [ "$font_loaded" = "0" ] ; then
  if loadfont /boot/grub/unicode.pf2 ; then
    set font_loaded=1
    # Standard 16pt font: limit to moderate resolutions for readability
    set gfxmode=1280x1024,1024x768,auto
  fi
fi

# Initialize graphics if font loaded successfully
if [ "$font_loaded" = "1" ] ; then
   insmod png
   load_video
   insmod gfxterm
   terminal_output gfxterm
fi

if [ "${grub_platform}" == "efi" ] ; then
  if [ "${grml_secureboot}" = "true" ] ; then
    if [ -f /boot/grub/grml-theme/sb-theme.txt ] ; then
      set theme=/boot/grub/grml-theme/sb-theme.txt
      export theme
    else
      set menu_color_normal=white/black
      set menu_color_highlight=black/orange
      export menu_color_normal
      export menu_color_highlight
    fi
  elif [ -f /boot/grub/grml-theme/theme.txt ] ; then
    set theme=/boot/grub/grml-theme/theme.txt
    export theme
  else
    set menu_color_normal=white/black
    set menu_color_highlight=black/yellow
    export menu_color_normal
    export menu_color_highlight
  fi
else
  set default=2
  menuentry "LEGACY BOOT" {
    true
  }
  menuentry "" {
    true
  }

  if [ -f /boot/grub/grml-theme/bios-theme.txt ] ; then
    set theme=/boot/grub/grml-theme/bios-theme.txt
    export theme
  else
    set menu_color_normal=white/black
    set menu_color_highlight=black/yellow
    export menu_color_normal
    export menu_color_highlight
  fi
fi

if [ ${iso_path} ] ; then
    set loopback="findiso=${iso_path}"
    export loopback
fi
